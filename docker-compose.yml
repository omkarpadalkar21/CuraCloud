services:

  # ─────────────────────────────────────────
  # PostgreSQL 17 — Patient Service DB
  # ─────────────────────────────────────────
  patient-service-db:
    image: postgres:17-alpine
    container_name: patient-service-db
    environment:
      POSTGRES_DB: db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: changemeinprod!
    volumes:
      - /home/caffeine/Desktop/Progata/Projects/CuraCloud/db_volumes/patient-service-db:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Zookeeper (required by Kafka 7.5.0)
  # ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep -q Mode"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─────────────────────────────────────────
  # Kafka Broker
  # ─────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Listener for internal Docker traffic
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "29092:29092"   # host access (e.g. from IDE / Kafka UI)
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 30"]
      interval: 15s
      timeout: 30s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────
  # Patient Service
  # ─────────────────────────────────────────
  patient-service:
    build:
      context: ./patient-service
      dockerfile: Dockerfile
    environment:
      BILLING_SERVICE_ADDRESS: ${BILLING_SERVICE_ADDRESS}
      BILLING_SERVICE_GRPC_PORT: ${BILLING_SERVICE_GRPC_PORT}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    container_name: patient-service
    ports:
      - "4000:4000"
    depends_on:
      patient-service-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - internal

  # ─────────────────────────────────────────
  # Billing Service
  # ─────────────────────────────────────────
  billing-service:
    build:
      context: ./billing-service
      dockerfile: Dockerfile
    container_name: billing-service
    ports:
      - "4001:4001"   # REST / HTTP
      - "9001:9001"   # gRPC
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - internal

# ─────────────────────────────────────────
# Networks
# ─────────────────────────────────────────
networks:
  internal:
    driver: bridge
