# Cluster 2 — hosts Billing Service, Analytics Service, Kafka, Zookeeper
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: curacloud-cluster2
networking:
  podSubnet: "10.20.0.0/16" # Different from Cluster 1
  serviceSubnet: "10.120.0.0/16" # Different from Cluster 1
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 80
        hostPort: 81 # Different host port to avoid conflict
        listenAddress: "127.0.0.1"
        protocol: TCP
      - containerPort: 443
        hostPort: 444 # Different host port to avoid conflict
        listenAddress: "127.0.0.1"
        protocol: TCP
  - role: worker
  - role: worker
