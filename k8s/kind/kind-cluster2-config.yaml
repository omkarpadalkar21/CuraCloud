kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  podSubnet: "10.20.0.0/16"
  serviceSubnet: "10.120.0.0/16"
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 80
        hostPort: 81
        listenAddress: "127.0.0.1"
        protocol: TCP
      - containerPort: 443
        hostPort: 444
        listenAddress: "127.0.0.1"
        protocol: TCP
